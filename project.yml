name: MissionControl

options:
  bundleIdPrefix: com.focacci
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: "YES"

targets:

  MissionControl:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
      - path: MissionControl
        excludes:
          - "Assets.xcassets"
          - "Info.plist"
    resources:
      - path: MissionControl/Assets.xcassets
    info:
      path: MissionControl/Info.plist
      properties:
        CFBundleDisplayName: Mission Control
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
        UIRequiresFullScreen: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.focacci.MissionControl
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"

  MissionControlWatch Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Shared
      - path: MissionControlWatch
        excludes:
          - "Assets.xcassets"
          - "Info.plist"
    resources:
      - path: MissionControlWatch/Assets.xcassets
    info:
      path: MissionControlWatch/Info.plist
      properties:
        CFBundleDisplayName: Mission Control
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        WKApplication: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.focacci.MissionControl.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "4"
